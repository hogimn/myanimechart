spring:
  application:
    name: application
  devtools:
    restart:
      poll-interval: 1s
    livereload:
      enabled: true
  config:
    import: file:../myanimechart-core/src/main/resources/application-dev.yml,file:../myanimechart-service/src/main/resources/application-dev.yml

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
